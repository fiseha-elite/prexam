<!Doctype html>
<html>
    <head>
        <title>This is youtubr button</title>
        <style>
.subscribe-button {
    background-color: rgb(214, 4, 4);
    border:none;
    height:36px;
    cursor: pointer;
    border-radius:2px;
   color: white;
   text-align: center;
   padding-right: 16px;
   padding-left:16px;
   font-size:14px;
   margin-right:12px;
   transition: 0.15s;

   
}
.subscribe-button:hover{
    opacity:0.7;
}
.subscribe-button:active{
    opacity:0.4;
}
.Join-button {
    background-color:white;
    color:rgb(0, 102, 255);
    height:36px;
    width:60px;
    border-color: rgb(0, 102, 255);
    border-width: 1px;
    cursor:pointer;
    border-radius: 2px;
    transition: background-color 1s, color 1s;
}
.Join-button:hover {
    background-color: rgb(37, 105, 231);
    color:white;
}
.Join-button:active{
   opacity:0.5;
}
.Tweet-button {
    background-color:rgb(37, 150, 255);
    color:white;
    border-radius:18px;
    height:36px;
    width:76px;
    border:none;
    font-weight:bold;
    font-size:14px;
    margin-left:12px;
    cursor:pointer;
    transition: box-shadow 0.15s;
}
.Tweet-button:hover{
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);

}

</style>
    </head>
    <body>
<button class="subscribe-button">SUBSCRIBE</button>
<button class="Join-button">JOIN</button>
<button class="Tweet-button">Tweet</button>

    </body>
</html>
