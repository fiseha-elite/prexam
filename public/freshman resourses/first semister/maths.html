<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Home of Elites</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --text: #1e293b;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #eef2ff, #f5f3ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 50px 30px;
            border-radius: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .icon-pulse {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 30px;
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .notify-box {
            display: flex;
            gap: 10px;
            background: var(--white);
            padding: 8px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        input {
            border: none;
            outline: none;
            padding: 10px 15px;
            flex-grow: 1;
            font-family: inherit;
            border-radius: 12px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); }

        .back-home {
            margin-top: 30px;
            display: inline-block;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }

        /* Floating decoration objects */
        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(60px);
            border-radius: 50%;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div class="blob" style="width: 300px; height: 300px; background: #c7d2fe; top: -100px; left: -100px;"></div>
    <div class="blob" style="width: 250px; height: 250px; background: #fbcfe8; bottom: -50px; right: -50px;"></div>

    <div class="glass-card">
        <div class="icon-pulse">🚀</div>
        <h1>Module Calibrating</h1>
        <p>Our elite developers are curating the best materials for this course. We're launching sooner than you think!</p>

        <div class="notify-box">
            <input type="email" placeholder="Enter campus email...">
            <button onclick="alert('You are on the list! We will notify you at launch.')">Notify Me</button>
        </div>

        <a href="../first.html" class="back-home">← Back to Dashboard</a>
    </div>

</body>
</html>
