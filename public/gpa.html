<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator | preXam Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Limits width on desktop */
        }

        .back-btn {
            background-color: #e64848;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover { background-color: #c0392b; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .se-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px 0; color: #333; text-align: center; }
        
        .instruction-text {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        /* The Grid for Inputs */
        .calc-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #007bff;
            font-size: 13px;
        }

        .calc-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr; /* Name, Score, Credit */
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .calc-row label {
            font-weight: 600;
            font-size: 14px;
            text-transform: capitalize;
        }

        .calc-row input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box; /* Crucial for mobile sizing */
            font-size: 14px;
        }

        .calculate-btn {
            background: #fccf09;
            color: #4b0082;
            border: none;
            padding: 15px;
            width: 100%; /* Makes it easy to tap on mobile */
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .calculate-btn:active { transform: scale(0.98); }

        #result {
            margin-top: 25px;
            padding: 15px;
            background: #eef5ff;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #007bff;
            text-align: center;
            min-height: 30px;
        }

        /* Mobile Adjustments */
        @media (max-width: 400px) {
            .calc-row label { font-size: 12px; }
            .calc-header { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="main-page.html" class="back-btn">⬅ Back to Main Menu</a>

    <div class="card">
        <img src="Gemini_Generated_Image_n56b76n56b76n56b.png" alt="Header Image" class="se-img">
        
        <h2>GPA Calculator</h2>
        <p class="instruction-text">Enter your raw scores (0-100) and credit hours for each subject.</p>

        <div id="calculator-form">
            <!-- Table Header -->
            <div class="calc-header">
                <span>Subject</span>
                <span>Score</span>
                <span>Cr.Hr</span>
            </div>

            <!-- Subject Rows -->
            <div class="calc-row">
                <label>course 1</label>
                <input type="number" id="mathScore" placeholder="0">
                <input type="number" id="mathCH" value="5">
            </div>
            <div class="calc-row">
                <label>course 2</label>
                <input type="number" id="physScore" placeholder="0">
                <input type="number" id="physCH" value="5">
            </div>
            <div class="calc-row">
                <label>course 3</label>
                <input type="number" id="engScore" placeholder="0">
                <input type="number" id="engCH" value="6">
            </div>
            <div class="calc-row">
                <label>course 4</label>
                <input type="number" id="geoScore" placeholder="0">
                <input type="number" id="geoCH" value="4">
            </div>
            <div class="calc-row">
                <label>course 5</label>
                <input type="number" id="civScore" placeholder="0">
                <input type="number" id="civCH" value="4">
            </div>
            <div class="calc-row">
                <label>course 6</label>
                <input type="number" id="psycScore" placeholder="0">
                <input type="number" id="psycCH" value="5">
            </div>
             <div class="calc-row">
                <label>course 7</label>
                <input type="number" id="loctScore" placeholder="0">
                <input type="number" id="loctCH" value="5">
            </div>


            <button onclick="calculateGPA()" class="calculate-btn">Calculate GPA</button>
            
            <div id="result">Your CGPA: --</div>
        </div>
    </div>
</div>

<script>
function getGradePoint(score) {
    if (score >= 85) return 4.0;
    if (score >= 80) return 3.75;
    if (score >= 75) return 3.5;
    if (score >= 70) return 3.0;
    if (score >= 65) return 2.75;
    if (score >= 60) return 2.5;
    if (score >= 50) return 2.0;
    if (score >= 45) return 1.5;
    if (score >= 40) return 1.0;
    return 0.0;
}

function calculateGPA() {
    const subjects = [
        { s: 'mathScore', c: 'mathCH' },
        { s: 'physScore', c: 'physCH' },
        { s: 'engScore', c: 'engCH' },
        { s: 'geoScore', c: 'geoCH' },
        { s: 'civScore', c: 'civCH' },
        { s: 'psycScore', c: 'psycCH' },
         { s: 'loctScore', c: 'loctCH' }

    ];

    let totalPoints = 0;
    let totalCH = 0;

    subjects.forEach(sub => {
        const score = parseFloat(document.getElementById(sub.s).value) || 0;
        const ch = parseFloat(document.getElementById(sub.c).value) || 0;
        
        totalPoints += (getGradePoint(score) * ch);
        totalCH += ch;
    });

    if (totalCH > 0) {
        const cgpa = totalPoints / totalCH;
        document.getElementById('result').innerHTML = "Your CGPA = " + cgpa.toFixed(2);
    } else {
        document.getElementById('result').innerHTML = "Enter Credit Hours!";
    }
}
</script>

</body>
</html>
